name: Build App

on:
  push:
    branches: [ main, feature/*, release/* ]
  pull_request:
    branches: [ main, feature/*, release/* ]
  workflow_dispatch:
    inputs:
      triggerRelease:
        description: 'Trigger Release'
        required: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ORG_GRADLE_PROJECT_releaseBuild: ${{ github.event_name == 'workflow_dispatch' && inputs.triggerRelease && github.ref == 'refs/heads/main' }}
  ORG_GRADLE_PROJECT_versionSuffix: >-
    ${{
      (github.event_name == 'pull_request' && format('PR{0}', github.event.pull_request.number)) ||
      ''
    }}

jobs:
  build_android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version-file: ".tool-versions"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Build
        run: ./gradlew :androidApp:assembleDebug

  build_ios:
    name: Build iOS
    runs-on: macos-26
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version-file: ".tool-versions"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Cache Konan
        uses: actions/cache@v6
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ github.sha }}
          restore-keys: ${{ runner.os }}-konan-
      - name: Select Xcode Version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4.1'
      - name: Build
        run: bundle exec fastlane ios build

  ktlint:
    name: Ktlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version-file: ".tool-versions"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Ktlint
        run: ./gradlew ktlintCheck
      - name: Archive ktlint results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ktlint-results
          path: "**/build/reports/ktlint/"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version-file: ".tool-versions"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Lint
        run: ./gradlew lint
      - name: Archive lint results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-results
          path: "**/build/reports/lint-results-*.*"

  android_tests:
    name: Android Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version-file: ".tool-versions"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Run Android Unit Tests
        run: ./gradlew :shared:testAndroidHostTest :shared:koverXmlReport
      - name: Codecov
        uses: codecov/codecov-action@v7
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-unit-test-results
          path: "**/build/reports/tests/"
      - name: Archive kover results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kover-results
          path: "**/build/reports/kover/"

  paparazzi_tests:
    name: Paparazzi Screenshot Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          lfs: 'true'
      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version-file: ".tool-versions"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Run Paparazzi Screenshot Tests
        run: ./gradlew :shared:verifyPaparazzi :shared:koverXmlReport -Ppaparazzi
      - name: Codecov
        uses: codecov/codecov-action@v7
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
      - name: Archive Paparazzi results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: paparazzi-results
          path: |
            **/build/paparazzi/failures/
            **/build/reports/kover/

  ios_tests:
    name: iOS Unit Tests
    runs-on: macos-26
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version-file: ".tool-versions"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Cache Konan
        uses: actions/cache@v6
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ github.sha }}
          restore-keys: ${{ runner.os }}-konan-
      - name: Run iOS Unit Tests
        run: ./gradlew :shared:iosSimulatorArm64Test
      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-unit-test-results
          path: "**/build/reports/tests/"
