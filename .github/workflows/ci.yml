name: CI

on:
  push:
    branches:
      - staging
      - main
  pull_request:
    branches:
      - staging
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: 🏗️ Build and Test app
    runs-on: macos-14
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: 💅 ktlint
        run: ./gradlew ktlintCheck
      - name: ✅ Domain tests
        run: ./gradlew :domain:allTests
      - name: ✅ Common tests (data + composeApp)
        run: ./gradlew :data:allTests :composeApp:allTests
      - name: 🏗️ Android assemble
        run: ./gradlew :composeApp:assembleDebug
      - name: 🏗️ iOS framework
        run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64
