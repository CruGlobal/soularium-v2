name: Release

# Tag-triggered release build. Artifacts are unsigned until Cru's signing
# credentials are configured; store submission (Fastlane) is intentionally
# manual for the initial releases — see docs/superpowers/HANDOFF.md.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version-file: .tool-versions
      - uses: gradle/actions/setup-gradle@v4
      - name: Assemble release APK + AAB
        run: ./gradlew :composeApp:assembleRelease :composeApp:bundleRelease
      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            mobile/composeApp/build/outputs/apk/release/*.apk
            mobile/composeApp/build/outputs/bundle/release/*.aab

  ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: iOS archive (placeholder)
        run: |
          echo "iOS release archiving is manual until Xcode signing and the"
          echo "Compose framework embed build phase are configured."
          echo "A Fastlane lane will replace this step once App Store"
          echo "credentials exist — see docs/superpowers/HANDOFF.md."
